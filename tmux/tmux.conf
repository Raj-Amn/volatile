# Basic status line settings
set -g status-position top
set -g status-justify left

# Status line colors (using terminal colors)
set -g status-style bg=terminal,fg=terminal

# Left side of status line (session name in black box)
set -g status-left-length 40
set -g status-left "#[bg=colour0,fg=colour7] #S #[bg=terminal,fg=terminal] "

# Window status format (inactive windows)
set -g window-status-format "#I:#W"
set -g window-status-style bg=terminal,fg=terminal

# Window status format (active/current window - using terminal green)
set -g window-status-current-format "#I:#W"
set -g window-status-current-style bg=terminal,fg=colour2

set -g window-status-separator " "

# Right side of status line (time and date)
set -g status-right-length 60
set -g status-right "#[bg=terminal,fg=terminal]%H:%M %d-%b-%y"

# Update status line every second for accurate time
set -g status-interval 1
